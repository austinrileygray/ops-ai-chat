<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OPS AI — OWNR OPS Training Assistant</title>
  <meta name="description" content="Search 1,600+ training videos from Austin Gray. Get instant answers on pricing, crew management, sales, and growing your land clearing business.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23E4600C'/><text x='16' y='22' text-anchor='middle' fill='white' font-family='system-ui' font-weight='700' font-size='16'>AI</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E4600C;
      --orange-hover: #ff7a2a;
      --orange-dim: rgba(228, 96, 12, 0.15);
      --green: #30D158;
      --green-dim: rgba(48, 209, 88, 0.15);
      --bg: #0a0a0a;
      --bg-elevated: #111111;
      --bg-input: #1a1a1a;
      --bg-user: rgba(228, 96, 12, 0.08);
      --bg-ai: #111111;
      --border: #222;
      --border-hover: #333;
      --text: #e5e5e5;
      --text-dim: #777;
      --text-source: #999;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    /* ─── Header ─── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 10px; }

    .logo-mark {
      width: 34px; height: 34px;
      background: var(--orange);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: white;
    }

    .header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
    .header-subtitle { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .tier-badge {
      font-size: 10px; padding: 3px 10px;
      border-radius: 20px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .tier-free { background: var(--orange-dim); color: var(--orange); }
    .tier-engine { background: var(--green-dim); color: var(--green); }
    .tier-accelerator { background: rgba(191, 90, 242, 0.15); color: #BF5AF2; }

    .auth-btn {
      font-size: 12px; padding: 6px 14px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text); cursor: pointer;
      font-family: inherit; font-weight: 500;
      transition: all 0.15s;
    }
    .auth-btn:hover { border-color: var(--orange); color: var(--orange); }
    .auth-btn.signed-in { border-color: var(--green); color: var(--green); }

    .stats-badge {
      font-size: 10px; padding: 3px 10px;
      background: rgba(255,255,255,0.04); color: var(--text-dim);
      border-radius: 20px; font-weight: 500;
      display: none;
    }

    /* ─── Auth Modal ─── */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      z-index: 100; display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.15s ease;
    }
    .modal {
      background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 380px; max-width: 90vw;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
    .modal .modal-desc { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; line-height: 1.5; }
    .modal label { font-size: 12px; font-weight: 600; color: var(--text-dim); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal input {
      width: 100%; padding: 10px 14px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 14px; font-family: inherit; outline: none;
      margin-bottom: 16px; transition: border-color 0.15s;
    }
    .modal input:focus { border-color: var(--orange); }
    .modal-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-primary {
      flex: 1; padding: 10px; background: var(--orange);
      border: none; border-radius: var(--radius-sm);
      color: white; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--orange-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      padding: 10px 20px; background: transparent;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text-dim); font-size: 14px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }
    .modal-error { font-size: 12px; color: #FF453A; margin-bottom: 12px; display: none; }
    .modal-footer { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 16px; }
    .modal-footer a { color: var(--orange); text-decoration: none; }

    /* ─── Chat Area ─── */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 2px;
      scroll-behavior: smooth;
    }

    /* ─── Welcome ─── */
    .welcome {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; gap: 20px; padding: 40px 20px;
    }
    .welcome-icon {
      width: 56px; height: 56px; background: var(--orange);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 24px; color: white; font-weight: 700;
    }
    .welcome h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.3; }
    .welcome p { color: var(--text-dim); font-size: 14px; max-width: 460px; line-height: 1.5; }
    .welcome-tier-note { font-size: 12px; color: var(--text-dim); margin-top: -8px; }
    .welcome-tier-note strong { color: var(--orange); }

    .quick-questions {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; max-width: 560px; width: 100%;
    }
    .quick-q {
      padding: 12px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 13px; cursor: pointer;
      transition: all 0.15s; font-family: inherit; text-align: left;
      line-height: 1.4;
    }
    .quick-q:hover { border-color: var(--orange); color: var(--orange); }

    /* ─── Messages ─── */
    .message {
      display: flex; gap: 12px;
      max-width: 800px; width: 100%; margin: 0 auto;
      padding: 16px 0;
      animation: fadeIn 0.2s ease;
    }
    .message + .message { border-top: 1px solid rgba(255,255,255,0.03); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 8px;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; margin-top: 2px;
    }
    .msg-avatar.user { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .msg-avatar.ai { background: var(--orange); color: white; }

    .msg-content { flex: 1; min-width: 0; }
    .msg-role {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .msg-text {
      font-size: 14px; line-height: 1.7;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg-text p { margin-bottom: 10px; }
    .msg-text p:last-child { margin-bottom: 0; }
    .msg-text strong { color: white; font-weight: 600; }
    .msg-text ul, .msg-text ol { margin: 8px 0 12px 18px; }
    .msg-text li { margin-bottom: 4px; }
    .msg-text code {
      background: rgba(255,255,255,0.08); padding: 2px 6px;
      border-radius: 4px; font-size: 12px;
    }
    .msg-text a { color: var(--orange); text-decoration: none; }
    .msg-text a:hover { text-decoration: underline; }

    /* ─── Sources ─── */
    .sources {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .sources-toggle {
      font-size: 11px; font-weight: 600; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      background: none; border: none; font-family: inherit; padding: 0;
    }
    .sources-toggle:hover { color: var(--text); }
    .sources-toggle .arrow { font-size: 10px; transition: transform 0.15s; }
    .sources-toggle .arrow.open { transform: rotate(90deg); }
    .source-list { margin-top: 8px; }
    .source-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 0; font-size: 12px; color: var(--text-source);
    }
    .source-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--orange); flex-shrink: 0;
    }
    .source-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .source-type {
      font-size: 10px; padding: 1px 6px; border-radius: 4px;
      background: rgba(255,255,255,0.05); color: var(--text-dim);
      text-transform: uppercase; font-weight: 600; letter-spacing: 0.3px;
    }
    .source-sim { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }

    /* ─── Typing ─── */
    .typing { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
    .typing-dot {
      width: 5px; height: 5px; background: var(--orange);
      border-radius: 50%; animation: typingBounce 1.2s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* ─── New conversation ─── */
    .new-chat-btn {
      position: absolute; top: 12px; right: 12px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-dim);
      padding: 6px 12px; font-size: 11px; font-weight: 500;
      cursor: pointer; font-family: inherit; z-index: 5;
      display: none; transition: all 0.15s;
    }
    .new-chat-btn:hover { border-color: var(--orange); color: var(--orange); }
    .new-chat-btn.visible { display: block; }

    /* ─── Input Area ─── */
    .input-area {
      padding: 12px 20px 20px;
      border-top: 1px solid var(--border);
      background: var(--bg); flex-shrink: 0;
    }
    .input-container {
      max-width: 800px; margin: 0 auto;
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-wrapper { flex: 1; position: relative; }
    .input-wrapper textarea {
      width: 100%; min-height: 44px; max-height: 140px;
      padding: 11px 14px; background: var(--bg-input);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 14px; font-family: inherit;
      resize: none; outline: none; transition: border-color 0.15s; line-height: 1.4;
    }
    .input-wrapper textarea::placeholder { color: #555; }
    .input-wrapper textarea:focus { border-color: var(--orange); }

    .send-btn {
      width: 44px; height: 44px; background: var(--orange);
      border: none; border-radius: var(--radius); color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    .send-btn:hover { background: var(--orange-hover); }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }

    .input-footer {
      max-width: 800px; margin: 6px auto 0;
      font-size: 10px; color: #444; text-align: center;
    }

    /* ─── Mobile ─── */
    @media (max-width: 640px) {
      .header { padding: 10px 14px; }
      .chat-area { padding: 14px; }
      .input-area { padding: 10px 14px 14px; }
      .quick-questions { grid-template-columns: 1fr; }
      .welcome h2 { font-size: 19px; }
      .welcome p { font-size: 13px; }
      .stats-badge { display: none !important; }
      .modal { padding: 24px; }
    }
    @media (min-width: 641px) {
      .stats-badge { display: inline-block; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
    const { useState, useRef, useEffect, useCallback, createElement: h } = React;

    const SUPABASE_URL = 'https://crlykmjjbvspqyunvdmy.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNybHlrbWpqYnZzcHF5dW52ZG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk0MDg4MTIsImV4cCI6MjA4NDk4NDgxMn0.yc8kM_RFGEAdXbB5V6q-E4wXMiSS2mn97l2SZivZ-bQ';
    const API_URL = SUPABASE_URL + '/functions/v1/ops-ai-search';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const QUICK_QUESTIONS = [
      'How do I price forestry mulching jobs?',
      'What equipment do I need to start?',
      'How should I structure my crew?',
      'Best way to find customers?',
      'How to handle difficult conditions?',
      'When should I raise my prices?',
    ];

    const TIER_LABELS = { free: 'Free', engine: 'OPS Engine', accelerator: 'Accelerator' };
    const TIER_CLASSES = { free: 'tier-free', engine: 'tier-engine', accelerator: 'tier-accelerator' };

    // ─── Icons ───
    function SendIcon() {
      return h('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
        h('line', { x1: 22, y1: 2, x2: 11, y2: 13 }),
        h('polygon', { points: '22 2 15 22 11 13 2 9 22 2' })
      );
    }

    // ─── Source Item ───
    function SourceItem({ source }) {
      return h('div', { className: 'source-item' },
        h('span', { className: 'source-dot' }),
        h('span', { className: 'source-title' }, source.title || 'Untitled'),
        source.type && h('span', { className: 'source-type' }, source.type),
        h('span', { className: 'source-sim' }, Math.round((source.similarity || 0) * 100) + '%')
      );
    }

    // ─── Message ───
    function Message({ role, text, sources, typing }) {
      const [sourcesOpen, setSourcesOpen] = useState(false);
      const isAI = role === 'ai';
      const htmlContent = typing ? null : (text ? marked.parse(text) : '');

      return h('div', { className: 'message' },
        h('div', { className: 'msg-avatar ' + (isAI ? 'ai' : 'user') }, isAI ? 'AI' : 'You'),
        h('div', { className: 'msg-content' },
          h('div', { className: 'msg-role' }, isAI ? 'OPS AI' : 'You'),
          typing
            ? h('div', { className: 'typing' },
                h('span', { className: 'typing-dot' }),
                h('span', { className: 'typing-dot' }),
                h('span', { className: 'typing-dot' })
              )
            : h('div', { className: 'msg-text', dangerouslySetInnerHTML: { __html: htmlContent } }),
          sources && sources.length > 0 && h('div', { className: 'sources' },
            h('button', {
              className: 'sources-toggle',
              onClick: () => setSourcesOpen(!sourcesOpen)
            },
              h('span', { className: 'arrow' + (sourcesOpen ? ' open' : '') }, '▶'),
              'Sources (' + sources.length + ')'
            ),
            sourcesOpen && h('div', { className: 'source-list' },
              sources.map((s, i) => h(SourceItem, { key: i, source: s }))
            )
          )
        )
      );
    }

    // ─── Auth Modal ───
    function AuthModal({ onClose, onSignIn }) {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [mode, setMode] = useState('signin'); // signin | magic

      async function handleSignIn(e) {
        e && e.preventDefault();
        if (!email.trim()) return;
        setLoading(true);
        setError('');

        try {
          if (mode === 'magic') {
            const { error } = await sb.auth.signInWithOtp({ email: email.trim() });
            if (error) throw error;
            setError('');
            alert('Check your email for a login link!');
            onClose();
          } else {
            const { data, error } = await sb.auth.signInWithPassword({
              email: email.trim(),
              password: password
            });
            if (error) throw error;
            onSignIn(data.session);
          }
        } catch (err) {
          setError(err.message || 'Sign in failed');
        }
        setLoading(false);
      }

      return h('div', { className: 'modal-overlay', onClick: (e) => e.target === e.currentTarget && onClose() },
        h('div', { className: 'modal' },
          h('h3', null, 'Sign in to OPS AI'),
          h('p', { className: 'modal-desc' }, 'OPS Engine and Accelerator members get access to the full training library. Sign in with your OPS Engine account.'),
          error && h('div', { className: 'modal-error', style: { display: 'block' } }, error),
          h('form', { onSubmit: handleSignIn },
            h('label', null, 'Email'),
            h('input', {
              type: 'email', value: email,
              onChange: (e) => setEmail(e.target.value),
              placeholder: 'you@company.com', autoFocus: true
            }),
            mode === 'signin' && h('label', null, 'Password'),
            mode === 'signin' && h('input', {
              type: 'password', value: password,
              onChange: (e) => setPassword(e.target.value),
              placeholder: 'Your password'
            }),
            h('div', { className: 'modal-actions' },
              h('button', { className: 'btn-secondary', type: 'button', onClick: onClose }, 'Cancel'),
              h('button', {
                className: 'btn-primary', type: 'submit',
                disabled: loading || !email.trim()
              }, loading ? 'Signing in...' : (mode === 'magic' ? 'Send Magic Link' : 'Sign In'))
            )
          ),
          h('div', { className: 'modal-footer' },
            mode === 'signin'
              ? h('span', null, 'No password? ', h('a', { href: '#', onClick: (e) => { e.preventDefault(); setMode('magic'); } }, 'Use magic link'))
              : h('span', null, 'Have a password? ', h('a', { href: '#', onClick: (e) => { e.preventDefault(); setMode('signin'); } }, 'Sign in with password'))
          )
        )
      );
    }

    // ─── Main App ───
    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [session, setSession] = useState(null);
      const [tier, setTier] = useState('free');
      const [userName, setUserName] = useState('');
      const [showAuth, setShowAuth] = useState(false);
      const [stats, setStats] = useState(null);
      const chatRef = useRef(null);
      const textareaRef = useRef(null);

      // Check session on load
      useEffect(() => {
        sb.auth.getSession().then(({ data: { session } }) => {
          if (session) handleSession(session);
        });
        const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
          if (session) handleSession(session);
          else { setSession(null); setTier('free'); setUserName(''); }
        });
        return () => subscription.unsubscribe();
      }, []);

      // Fetch stats once
      useEffect(() => {
        fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'stats' })
        }).then(r => r.json()).then(setStats).catch(() => {});
      }, []);

      async function handleSession(sess) {
        setSession(sess);
        setShowAuth(false);
        try {
          // Get user profile + company tier
          const { data: profile } = await sb.from('user_profiles').select('first_name, company_id').eq('id', sess.user.id).single();
          if (profile) {
            setUserName(profile.first_name || '');
            if (profile.company_id) {
              const { data: company } = await sb.from('companies').select('subscription_tier').eq('id', profile.company_id).single();
              if (company && company.subscription_tier) {
                setTier(company.subscription_tier);
              }
            }
          }
        } catch (e) {
          console.error('Profile fetch error:', e);
        }
      }

      async function handleSignOut() {
        await sb.auth.signOut();
        setSession(null); setTier('free'); setUserName('');
      }

      // Auto-scroll
      useEffect(() => {
        if (chatRef.current) {
          chatRef.current.scrollTop = chatRef.current.scrollHeight;
        }
      }, [messages, loading]);

      function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 140) + 'px';
      }

      // Build conversation context for multi-turn
      function buildContext() {
        const recent = messages.slice(-6); // last 3 exchanges
        return recent.map(m => ({
          role: m.role === 'user' ? 'user' : 'assistant',
          content: m.text
        }));
      }

      async function sendMessage(text) {
        if (!text.trim() || loading) return;
        const question = text.trim();
        setInput('');
        if (textareaRef.current) textareaRef.current.style.height = 'auto';

        setMessages(prev => [...prev, { role: 'user', text: question }]);
        setLoading(true);

        try {
          const headers = { 'Content-Type': 'application/json' };
          if (session?.access_token) {
            headers['Authorization'] = 'Bearer ' + session.access_token;
          }

          const body = {
            action: 'ask',
            question,
            tier: tier,
            include_sources: true,
          };

          // Add conversation context for multi-turn
          const context = buildContext();
          if (context.length > 0) {
            body.conversation_context = context;
          }

          const resp = await fetch(API_URL, { method: 'POST', headers, body: JSON.stringify(body) });
          const data = await resp.json();

          if (resp.status === 429) {
            setMessages(prev => [...prev, {
              role: 'ai',
              text: data.message || 'You\'ve hit the rate limit. Sign in for more queries, or try again in a bit.',
              sources: [],
            }]);
          } else if (data.error) {
            setMessages(prev => [...prev, {
              role: 'ai',
              text: 'Something went wrong — try again in a moment.',
              sources: [],
            }]);
          } else {
            setMessages(prev => [...prev, {
              role: 'ai',
              text: data.answer,
              sources: data.sources || [],
            }]);
          }
        } catch (err) {
          setMessages(prev => [...prev, {
            role: 'ai',
            text: 'Connection error. Check your internet and try again.',
            sources: [],
          }]);
        }

        setLoading(false);
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage(input);
        }
      }

      function startNewChat() {
        setMessages([]);
      }

      const showWelcome = messages.length === 0;
      const sourceCount = stats ? stats.sources : '1,600+';

      return h('div', { style: { display: 'flex', flexDirection: 'column', height: '100%', position: 'relative' } },

        // Header
        h('div', { className: 'header' },
          h('div', { className: 'header-left' },
            h('div', { className: 'logo-mark' }, 'AI'),
            h('div', null,
              h('div', { className: 'header-title' }, 'OPS AI'),
              h('div', { className: 'header-subtitle' }, 'Training Assistant')
            )
          ),
          h('div', { className: 'header-right' },
            h('span', { className: 'stats-badge' }, sourceCount + ' videos indexed'),
            h('span', { className: 'tier-badge ' + TIER_CLASSES[tier] }, TIER_LABELS[tier]),
            session
              ? h('button', { className: 'auth-btn signed-in', onClick: handleSignOut, title: 'Signed in as ' + (userName || session.user.email) },
                  (userName || 'You') + ' ✓'
                )
              : h('button', { className: 'auth-btn', onClick: () => setShowAuth(true) }, 'Sign In')
          )
        ),

        // New chat button
        h('button', {
          className: 'new-chat-btn' + (messages.length > 0 ? ' visible' : ''),
          onClick: startNewChat
        }, '+ New Chat'),

        // Chat area
        h('div', { className: 'chat-area', ref: chatRef },
          showWelcome
            ? h('div', { className: 'welcome' },
                h('div', { className: 'welcome-icon' }, 'AI'),
                h('h2', null, 'Ask anything about running a land clearing business'),
                h('p', null, 'Trained on ' + sourceCount + ' videos from Austin Gray. Covers pricing, equipment, crew management, sales, marketing, and scaling your operation.'),
                tier === 'free' && h('p', { className: 'welcome-tier-note' },
                  'Browsing as ', h('strong', null, 'Free'), '. ',
                  h('a', {
                    href: '#', style: { color: 'var(--orange)', textDecoration: 'none' },
                    onClick: (e) => { e.preventDefault(); setShowAuth(true); }
                  }, 'Sign in'),
                  ' for full access.'
                ),
                h('div', { className: 'quick-questions' },
                  QUICK_QUESTIONS.map((q, i) =>
                    h('button', { key: i, className: 'quick-q', onClick: () => sendMessage(q) }, q)
                  )
                )
              )
            : messages.map((msg, i) =>
                h(Message, { key: i, role: msg.role, text: msg.text, sources: msg.sources })
              ),
          loading && h(Message, { role: 'ai', typing: true })
        ),

        // Input
        h('div', { className: 'input-area' },
          h('div', { className: 'input-container' },
            h('div', { className: 'input-wrapper' },
              h('textarea', {
                ref: textareaRef, value: input,
                onChange: (e) => { setInput(e.target.value); autoResize(e.target); },
                onKeyDown: handleKeyDown,
                placeholder: 'Ask about pricing, equipment, crews, sales...',
                rows: 1, disabled: loading,
              })
            ),
            h('button', {
              className: 'send-btn',
              onClick: () => sendMessage(input),
              disabled: !input.trim() || loading,
            }, h(SendIcon))
          ),
          h('div', { className: 'input-footer' },
            'Answers are AI-generated from Austin Gray\'s training library. Always verify important decisions.'
          )
        ),

        // Auth modal
        showAuth && h(AuthModal, {
          onClose: () => setShowAuth(false),
          onSignIn: handleSession,
        })
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(h(App));
  </script>
</body>
</html>
