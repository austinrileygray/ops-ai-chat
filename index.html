<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPS AI — OWNR OPS Training Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { height: 100%; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; }

    /* Header */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; background: #111; border-bottom: 1px solid #333; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 36px; height: 36px; background: #E4600C; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; }
    .header-title { font-weight: 700; font-size: 16px; }
    .header-subtitle { font-size: 12px; color: #888; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-badge { font-size: 11px; background: rgba(228,96,12,0.15); color: #E4600C; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
    .header-user { font-size: 12px; color: #888; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn { background: none; border: 1px solid #444; color: #aaa; padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    .logout-btn:hover { border-color: #666; color: #fff; }

    /* Chat area */
    .chat-area { flex: 1; overflow-y: auto; padding: 24px; }

    /* Welcome */
    .welcome { text-align: center; margin-top: 15vh; }
    .welcome-icon { width: 64px; height: 64px; background: #E4600C; border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 24px; color: #fff; margin-bottom: 20px; }
    .welcome h2 { font-size: 22px; margin-bottom: 12px; color: #fff; }
    .welcome p { color: #888; max-width: 500px; margin: 0 auto 28px; font-size: 14px; line-height: 1.5; }
    .quick-questions { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 600px; margin: 0 auto; }
    .quick-q { background: #2a2a2a; border: 1px solid #444; color: #ccc; padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; }
    .quick-q:hover { background: #333; border-color: #E4600C; color: #fff; }

    /* Messages */
    .message { display: flex; gap: 12px; margin-bottom: 24px; max-width: 800px; }
    .msg-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .msg-avatar.ai { background: #E4600C; color: #fff; }
    .msg-avatar.user { background: #333; color: #aaa; }
    .msg-role { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 4px; }
    .msg-text { font-size: 14px; line-height: 1.6; color: #ddd; }
    .msg-text p { margin-bottom: 8px; }
    .msg-text ul, .msg-text ol { margin: 8px 0 8px 20px; }
    .msg-text code { background: #2a2a2a; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .msg-text pre { background: #2a2a2a; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }

    /* Sources */
    .sources { margin-top: 12px; padding: 10px; background: #222; border-radius: 8px; }
    .sources-label { font-size: 11px; font-weight: 600; color: #888; margin-bottom: 6px; }
    .source-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #aaa; padding: 3px 0; }
    .source-dot { width: 6px; height: 6px; background: #E4600C; border-radius: 50%; flex-shrink: 0; }
    .source-sim { color: #666; margin-left: auto; }

    /* Typing indicator */
    .typing { display: flex; gap: 4px; padding: 8px 0; }
    .typing-dot { width: 8px; height: 8px; background: #555; border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    /* Input */
    .input-area { padding: 16px 24px; border-top: 1px solid #333; background: #1a1a1a; }
    .input-container { display: flex; align-items: flex-end; gap: 8px; max-width: 800px; }
    .input-wrapper { flex: 1; background: #2a2a2a; border: 1px solid #444; border-radius: 12px; padding: 0 16px; }
    .input-wrapper textarea { width: 100%; background: none; border: none; color: #fff; font-size: 14px; padding: 14px 0; resize: none; outline: none; font-family: inherit; line-height: 1.4; max-height: 160px; }
    .input-wrapper textarea::placeholder { color: #666; }
    .send-btn { width: 44px; height: 44px; background: #E4600C; border: none; border-radius: 10px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:disabled { opacity: 0.4; cursor: default; }
    .send-btn svg { width: 18px; height: 18px; }
    .input-footer { text-align: center; font-size: 11px; color: #555; margin-top: 8px; }

    /* Login screen */
    .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 24px; }
    .login-card { background: #222; border: 1px solid #333; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; text-align: center; }
    .login-card .logo-mark { width: 56px; height: 56px; font-size: 20px; margin: 0 auto 20px; }
    .login-card h2 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .login-card p { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.5; }
    .login-input { width: 100%; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 12px; font-family: inherit; }
    .login-input:focus { border-color: #E4600C; }
    .login-input::placeholder { color: #666; }
    .login-btn { width: 100%; background: #E4600C; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .login-btn:disabled { opacity: 0.5; cursor: default; }
    .login-btn:hover:not(:disabled) { background: #d45500; }
    .login-error { color: #ef4444; font-size: 13px; margin-bottom: 12px; }
    .login-success { color: #22c55e; font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
    .login-toggle { color: #888; font-size: 13px; cursor: pointer; }
    .login-toggle span { color: #E4600C; }
    .login-toggle span:hover { text-decoration: underline; }
    .login-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: #555; font-size: 12px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #333; }
    .password-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .password-row .login-input { margin-bottom: 0; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const { useState, useRef, useEffect, createElement: h } = React;

// ─── Supabase Config ─────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://crlykmjjbvspqyunvdmy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNybHlrbWpqYnZzcHF5dW52ZG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNzQ0MDEsImV4cCI6MjA4NjY1MDQwMX0.LrnatkMaTp6f3XEfLhO2c1bS5XmpHOnRV--cWfbPlh8';
const API_URL = SUPABASE_URL + '/functions/v1/ops-ai-search';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const QUICK_QUESTIONS = [
  'How do I price forestry mulching jobs?',
  'What equipment do I need to get started?',
  'How should I structure my crew?',
  'Best way to find land clearing customers?',
  'How to handle difficult job site conditions?',
  'When should I raise my prices?',
];

// ─── Icons ───────────────────────────────────────────────────────────────────
function SendIcon() {
  return h('svg', { viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
    h('line', { x1: 22, y1: 2, x2: 11, y2: 13 }),
    h('polygon', { points: '22 2 15 22 11 13 2 9 22 2' })
  );
}

// ─── Login Screen ────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [mode, setMode] = useState('login'); // login | signup | magic
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  async function handleLogin(e) {
    if (e) e.preventDefault();
    if (!email.trim()) return;
    setError('');
    setSuccess('');
    setLoading(true);

    try {
      if (mode === 'magic') {
        const { error: authError } = await supabase.auth.signInWithOtp({
          email: email.trim(),
          options: { shouldCreateUser: false }
        });
        if (authError) throw authError;
        setSuccess('Check your email for a login link. Click it to access OPS AI.');
      } else if (mode === 'login') {
        const { error: authError } = await supabase.auth.signInWithPassword({
          email: email.trim(),
          password: password,
        });
        if (authError) throw authError;
        // onLogin will be triggered by the auth state change listener
      } else if (mode === 'signup') {
        const { error: authError } = await supabase.auth.signUp({
          email: email.trim(),
          password: password,
        });
        if (authError) throw authError;
        setSuccess('Account created! Check your email to confirm, then log in.');
        setMode('login');
      }
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  }

  return h('div', { className: 'login-screen' },
    h('div', { className: 'login-card' },
      h('div', { className: 'logo-mark' }, 'AI'),
      h('h2', null, 'OPS AI Training Assistant'),
      h('p', null, 'Sign in with your OPS Engine account to access 1,600+ training videos from Austin Gray on pricing, equipment, crews, sales, and growing your operation.'),

      error && h('div', { className: 'login-error' }, error),
      success && h('div', { className: 'login-success' }, success),

      // Email input
      h('input', {
        className: 'login-input',
        type: 'email',
        placeholder: 'Your email address',
        value: email,
        onChange: (e) => setEmail(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter' && mode === 'magic') handleLogin(); },
        disabled: loading,
      }),

      // Password input (for login/signup modes)
      (mode === 'login' || mode === 'signup') && h('input', {
        className: 'login-input',
        type: 'password',
        placeholder: mode === 'signup' ? 'Create a password (min 6 chars)' : 'Password',
        value: password,
        onChange: (e) => setPassword(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter') handleLogin(); },
        disabled: loading,
      }),

      // Submit button
      h('button', {
        className: 'login-btn',
        onClick: handleLogin,
        disabled: loading || !email.trim() || ((mode === 'login' || mode === 'signup') && !password),
      }, loading ? 'Please wait...' :
         mode === 'magic' ? 'Send Magic Link' :
         mode === 'signup' ? 'Create Account' : 'Sign In'),

      // Mode toggles
      mode === 'login' && h('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
        h('div', { className: 'login-divider' }, 'or'),
        h('div', { className: 'login-toggle' },
          h('span', { onClick: () => { setMode('magic'); setError(''); setSuccess(''); } }, 'Sign in with magic link')
        ),
        h('div', { className: 'login-toggle', style: { marginTop: '4px' } },
          'No account? ',
          h('span', { onClick: () => { setMode('signup'); setError(''); setSuccess(''); } }, 'Sign up')
        )
      ),

      mode === 'magic' && h('div', { className: 'login-toggle', style: { marginTop: '8px' } },
        h('span', { onClick: () => { setMode('login'); setError(''); setSuccess(''); } }, 'Sign in with password instead')
      ),

      mode === 'signup' && h('div', { className: 'login-toggle', style: { marginTop: '8px' } },
        'Already have an account? ',
        h('span', { onClick: () => { setMode('login'); setError(''); setSuccess(''); } }, 'Sign in')
      ),
    )
  );
}

// ─── Message Component ───────────────────────────────────────────────────────
function Message({ role, text, sources, typing }) {
  const isAI = role === 'ai';
  const htmlContent = typing ? null : (text ? marked.parse(text) : '');
  return h('div', { className: 'message' },
    h('div', { className: 'msg-avatar ' + (isAI ? 'ai' : 'user') }, isAI ? 'AI' : 'You'),
    h('div', { className: 'msg-content' },
      h('div', { className: 'msg-role' }, isAI ? 'OPS AI' : 'You'),
      typing
        ? h('div', { className: 'typing' },
            h('span', { className: 'typing-dot' }),
            h('span', { className: 'typing-dot' }),
            h('span', { className: 'typing-dot' })
          )
        : h('div', { className: 'msg-text', dangerouslySetInnerHTML: { __html: htmlContent } }),
      sources && sources.length > 0 && h('div', { className: 'sources' },
        h('div', { className: 'sources-label' }, 'Sources (' + sources.length + ')'),
        sources.map((s, i) =>
          h('div', { key: i, className: 'source-item' },
            h('span', { className: 'source-dot' }),
            h('span', null, s.title),
            h('span', { className: 'source-sim' }, Math.round(s.similarity * 100) + '% match')
          )
        )
      )
    )
  );
}

// ─── Main App ────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const chatRef = useRef(null);
  const textareaRef = useRef(null);

  // Listen for auth state changes
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setLoading(false);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      setLoading(false);
    });

    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, sending]);

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  async function sendMessage(text) {
    if (!text.trim() || sending) return;
    const question = text.trim();
    setInput('');
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    setMessages(prev => [...prev, { role: 'user', text: question }]);
    setSending(true);

    try {
      const headers = { 'Content-Type': 'application/json' };
      // Pass the user's JWT if authenticated
      if (session?.access_token) {
        headers['Authorization'] = 'Bearer ' + session.access_token;
      }

      const resp = await fetch(API_URL, {
        method: 'POST',
        headers,
        body: JSON.stringify({ action: 'ask', question, include_sources: true }),
      });
      const data = await resp.json();

      if (resp.status === 429) {
        setMessages(prev => [...prev, { role: 'ai', text: data.message || 'Rate limit reached. Try again later.', sources: [] }]);
      } else if (data.error) {
        setMessages(prev => [...prev, { role: 'ai', text: 'Something went wrong. Try again in a moment.', sources: [] }]);
      } else {
        setMessages(prev => [...prev, { role: 'ai', text: data.answer, sources: data.sources || [] }]);
      }
    } catch (err) {
      setMessages(prev => [...prev, { role: 'ai', text: 'Connection error. Please check your internet and try again.', sources: [] }]);
    }
    setSending(false);
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    setMessages([]);
  }

  // Loading state
  if (loading) {
    return h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: '#888' } }, 'Loading...');
  }

  // Not logged in — show login screen
  if (!session) {
    return h(LoginScreen, { onLogin: (s) => setSession(s) });
  }

  // Logged in — show chat
  const showWelcome = messages.length === 0;
  const userEmail = session.user?.email || '';

  return h('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' } },
    // Header
    h('div', { className: 'header' },
      h('div', { className: 'header-left' },
        h('div', { className: 'logo-mark' }, 'AI'),
        h('div', null,
          h('div', { className: 'header-title' }, 'OPS AI'),
          h('div', { className: 'header-subtitle' }, 'OWNR OPS Training Assistant')
        )
      ),
      h('div', { className: 'header-right' },
        h('div', { className: 'header-badge' }, '1,600+ Videos Indexed'),
        h('div', { className: 'header-user' }, userEmail),
        h('button', { className: 'logout-btn', onClick: handleLogout }, 'Sign Out')
      )
    ),

    // Chat area
    h('div', { className: 'chat-area', ref: chatRef },
      showWelcome
        ? h('div', { className: 'welcome' },
            h('div', { className: 'welcome-icon' }, 'AI'),
            h('h2', null, 'Ask anything about running a land clearing business'),
            h('p', null, 'Trained on 1,600+ videos from Austin Gray covering pricing, equipment, crew management, sales, marketing, and growing your operation.'),
            h('div', { className: 'quick-questions' },
              QUICK_QUESTIONS.map((q, i) =>
                h('button', { key: i, className: 'quick-q', onClick: () => sendMessage(q) }, q)
              )
            )
          )
        : messages.map((msg, i) => h(Message, { key: i, role: msg.role, text: msg.text, sources: msg.sources })),
      sending && h(Message, { role: 'ai', typing: true })
    ),

    // Input
    h('div', { className: 'input-area' },
      h('div', { className: 'input-container' },
        h('div', { className: 'input-wrapper' },
          h('textarea', {
            ref: textareaRef,
            value: input,
            onChange: (e) => { setInput(e.target.value); autoResize(e.target); },
            onKeyDown: handleKeyDown,
            placeholder: 'Ask about pricing, equipment, crews, sales...',
            rows: 1,
            disabled: sending,
          })
        ),
        h('button', { className: 'send-btn', onClick: () => sendMessage(input), disabled: !input.trim() || sending }, h(SendIcon))
      ),
      h('div', { className: 'input-footer' }, "OPS AI searches Austin Gray's training library. Answers are AI-generated \u2014 always verify important decisions.")
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
