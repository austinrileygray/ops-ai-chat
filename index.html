    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    .login-card p { font-size: 14px; color: #888; margin-bottom: 24px; line-height: 1.5; }
    .login-input { width: 100%; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none; margin-bottom: 12px; font-family: inherit; }
    .login-input:focus { border-color: #E4600C; }
    .login-input::placeholder { color: #666; }
    .login-btn { width: 100%; background: #E4600C; color: #fff; border: none; padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 12px; }
    .login-btn:disabled { opacity: 0.5; cursor: default; }

<script>

const SUPABASE_URL = 'https://crlykmjjbvspqyunvdmy.supabase.co';

// 芒聰聙芒聰聙芒聰聙 Icons 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function OwnrLogo({ size }) {

// 芒聰聙芒聰聙芒聰聙 Login Screen 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [mode, setMode] = useState('login'); // login | signup | magic
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  async function handleLogin(e) {
    if (e) e.preventDefault();
    if (!email.trim()) return;
    setError('');
    setSuccess('');
    setLoading(true);

    try {
      if (mode === 'magic') {
        const { error: authError } = await supabase.auth.signInWithOtp({
          email: email.trim(),
          options: { shouldCreateUser: false }
        });
        if (authError) throw authError;
        setSuccess('Check your email for a login link. Click it to access OPS AI.');
      } else if (mode === 'login') {
        const { error: authError } = await supabase.auth.signInWithPassword({
          email: email.trim(),
          password: password,
        });
        if (authError) throw authError;
        // onLogin will be triggered by the auth state change listener
      } else if (mode === 'signup') {
        const { error: authError } = await supabase.auth.signUp({
          email: email.trim(),
          password: password,
        });
        if (authError) throw authError;
        setSuccess('Account created! Check your email to confirm, then log in.');
        setMode('login');
      }
    } catch (err) {
      setError(err.message || 'Something went wrong');
    }
    setLoading(false);
  }

  return h('div', { className: 'login-screen' },
    h('div', { className: 'login-card' },
      h(OwnrLogo, { size: 56 }),
      h('h2', null, 'OPS AI Training Assistant'),
      h('p', null, 'Sign in with your OPS Engine account to access 1,600+ training videos from Austin Gray on pricing, equipment, crews, sales, and growing your operation.'),

      error && h('div', { className: 'login-error' }, error),
      success && h('div', { className: 'login-success' }, success),

      // Email input
      h('input', {
        className: 'login-input',
        type: 'email',
        placeholder: 'Your email address',
        value: email,
        onChange: (e) => setEmail(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter' && mode === 'magic') handleLogin(); },
        disabled: loading,
      }),

      // Password input (for login/signup modes)
      (mode === 'login' || mode === 'signup') && h('input', {
        className: 'login-input',
        type: 'password',
        placeholder: mode === 'signup' ? 'Create a password (min 6 chars)' : 'Password',
        value: password,
        onChange: (e) => setPassword(e.target.value),
        onKeyDown: (e) => { if (e.key === 'Enter') handleLogin(); },
        disabled: loading,
      }),

      // Submit button
      h('button', {
        className: 'login-btn',
        onClick: handleLogin,
        disabled: loading || !email.trim() || ((mode === 'login' || mode === 'signup') && !password),
      }, loading ? 'Please wait...' :
         mode === 'magic' ? 'Send Magic Link' :
         mode === 'signup' ? 'Create Account' : 'Sign In'),

      // Mode toggles
      mode === 'login' && h('div', { style: { display: 'flex', flexDirection: 'column', gap: '8px' } },
        h('div', { className: 'login-divider' }, 'or'),
        h('div', { className: 'login-toggle' },
          h('span', { onClick: () => { setMode('magic'); setError(''); setSuccess(''); } }, 'Sign in with magic link')
        ),
        h('div', { className: 'login-toggle', style: { marginTop: '4px' } },
          'No account? ',
          h('span', { onClick: () => { setMode('signup'); setError(''); setSuccess(''); } }, 'Sign up')
        )
      ),

      mode === 'magic' && h('div', { className: 'login-toggle', style: { marginTop: '8px' } },
        h('span', { onClick: () => { setMode('login'); setError(''); setSuccess(''); } }, 'Sign in with password instead')
      ),

      mode === 'signup' && h('div', { className: 'login-toggle', style: { marginTop: '8px' } },
        'Already have an account? ',
        h('span', { onClick: () => { setMode('login'); setError(''); setSuccess(''); } }, 'Sign in')
      ),
    )
  );
}

// 芒聰聙芒聰聙芒聰聙 Message Component 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function Message({ role, text, sources, typing }) {
  const isAI = role === 'ai';
  const htmlContent = typing ? null : (text ? marked.parse(text) : '');
  return h('div', { className: 'message' },
    h('div', { className: 'msg-avatar ' + (isAI ? 'ai' : 'user') }, isAI ? h(OwnrLogo, { size: 24 }) : 'You'),
    h('div', { className: 'msg-content' },
      h('div', { className: 'msg-role' }, isAI ? 'OPS AI' : 'You'),
      typing
        ? h('div', { className: 'typing' },
            h('span', { className: 'typing-dot' }),
            h('span', { className: 'typing-dot' }),
            h('span', { className: 'typing-dot' })
          )
        : h('div', { className: 'msg-text', dangerouslySetInnerHTML: { __html: htmlContent } }),
      sources && sources.length > 0 && h('div', { className: 'sources' },
        h('div', { className: 'sources-label' }, 'Sources (' + sources.length + ')'),
        sources.map((s, i) =>
          h('div', { key: i, className: 'source-item' },
            h('span', { className: 'source-dot' }),
            s.url
              ? h('a', { href: s.url, target: '_blank', rel: 'noopener noreferrer' }, s.title)
              : h('span', null, s.title),
            s.similarity && h('span', { className: 'source-sim' }, Math.round(s.similarity * 100) + '% match')
          )
        )
      )
    )
  );
}

// 芒聰聙芒聰聙芒聰聙 Main App 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const chatRef = useRef(null);
  const textareaRef = useRef(null);

  // Listen for auth state changes
  useEffect(() => {
    supabase.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
      setLoading(false);
    });

    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      setSession(session);
      setLoading(false);
    });

    return () => subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages, sending]);

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  // Helper: get a fresh access token, refreshing if needed
  async function getFreshToken() {
    if (!session) return null;
    // Check if token expires within next 60 seconds
    const expiresAt = session.expires_at; // unix timestamp in seconds
    const now = Math.floor(Date.now() / 1000);
    if (expiresAt && (expiresAt - now) < 60) {
      // Token is expired or about to expire 芒聙聰 refresh it
      const { data, error } = await supabase.auth.refreshSession();
      if (error) {
        console.error('Token refresh failed:', error.message);
        // Force re-login if refresh fails
        await supabase.auth.signOut();
        setSession(null);
        return null;
      }
      if (data?.session) {
        setSession(data.session);
        return data.session.access_token;
      }
    }
    return session.access_token;
  }

  async function sendMessage(text) {
    if (!text.trim() || sending) return;
    const question = text.trim();
    setInput('');
    if (textareaRef.current) textareaRef.current.style.height = 'auto';
    setMessages(prev => [...prev, { role: 'user', text: question }]);
    setSending(true);

    try {
      const headers = { 'Content-Type': 'application/json' };
      // Get a fresh token (auto-refreshes if expired)
      const token = await getFreshToken();
      if (token) {
        headers['Authorization'] = 'Bearer ' + token;
      }

      const resp = await fetch(API_URL, {
        method: 'POST',
        headers,
        body: JSON.stringify({ action: 'ask', question, include_sources: true }),
      });
      const data = await resp.json();

      if (resp.status === 429) {
        setMessages(prev => [...prev, { role: 'ai', text: data.message || 'Rate limit reached. Try again later.', sources: [] }]);
      } else if (data.error) {
        setMessages(prev => [...prev, { role: 'ai', text: 'Something went wrong. Try again in a moment.', sources: [] }]);
      } else {
        // Warn if API says unauthenticated despite us sending a token
        if (data.authenticated === false && session) {
          console.warn('API returned unauthenticated 芒聙聰 forcing token refresh');
          const { data: refreshData } = await supabase.auth.refreshSession();
          if (refreshData?.session) setSession(refreshData.session);
        }
        setMessages(prev => [...prev, { role: 'ai', text: data.answer, sources: data.sources || [] }]);
      }
    } catch (err) {
      setMessages(prev => [...prev, { role: 'ai', text: 'Connection error. Please check your internet and try again.', sources: [] }]);
    }
    setSending(false);
  }

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage(input);
    }
  }

  async function handleLogout() {
    await supabase.auth.signOut();
    setMessages([]);
  }

  // Loading state
  if (loading) {
    return h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', color: '#888' } }, 'Loading...');
  }

  // Not logged in 芒聙聰 show login screen
  if (!session) {
    return h(LoginScreen, { onLogin: (s) => setSession(s) });
  }

  // Logged in 芒聙聰 show chat
  const showWelcome = messages.length === 0;
  const userEmail = session.user?.email || '';

  return h('div', { style: { display: 'flex', flexDirection: 'column', height: '100%' } },
    // Header
    h('div', { className: 'header' },
      h('div', { className: 'header-left' },
        h(OwnrLogo, { size: 36 }),
        h('div', null,
          h('div', { className: 'header-title' }, 'OPS AI'),
          h('div', { className: 'header-subtitle' }, 'OWNR OPS Training Assistant')
        )
      ),
      h('div', { className: 'header-right' },
        h('div', { className: 'header-badge' }, '1,600+ Videos Indexed'),
        h('div', { className: 'header-user' }, userEmail),
        h('button', { className: 'logout-btn', onClick: handleLogout }, 'Sign Out')
      )
    ),

    // Chat area
    h('div', { className: 'chat-area', ref: chatRef },
      showWelcome
        ? h('div', { className: 'welcome' },
            h('div', { className: 'welcome-icon' }, h(OwnrLogo, { size: 48 })),
            h('h2', null, 'Ask anything about running a land clearing business'),
            h('p', null, 'Trained on 1,600+ videos from Austin Gray covering pricing, equipment, crew management, sales, marketing, and growing your operation.'),
            h('div', { className: 'quick-questions' },
              QUICK_QUESTIONS.map((q, i) =>
                h('button', { key: i, className: 'quick-q', onClick: () => sendMessage(q) }, q)
              )
            )
          )
        : messages.map((msg, i) => h(Message, { key: i, role: msg.role, text: msg.text, sources: msg.sources })),
      sending && h(Message, { role: 'ai', typing: true })
    ),

    // Input
    h('div', { className: 'input-area' },
      h('div', { className: 'input-container' },
        h('div', { className: 'input-wrapper' },
          h('textarea', {
            ref: textareaRef,
            value: input,
            onChange: (e) => { setInput(e.target.value); autoResize(e.target); },
            onKeyDown: handleKeyDown,
            placeholder: 'Ask about pricing, equipment, crews, sales...',
            rows: 1,
            disabled: sending,
          })
        ),
        h('button', { className: 'send-btn', onClick: () => sendMessage(input), disabled: !input.trim() || sending }, h(SendIcon))
      ),
      h('div', { className: 'input-footer' }, "OPS AI searches Austin Gray's training library. Answers are AI-generated \u2014 always verify important decisions.")
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
